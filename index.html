<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weather App</title>
</head>
<body>

    <div class="container">

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Search for cities...">
            <button id="searchBtn">Search</button>
        </div>

        <div class="weather-card" id="weatherCard">

            <div class="video-section">
                <video id="bgVideo" autoplay muted loop playsinline>
                    <source src="videos/Clear.mp4" type="video/mp4">
                </video>

                <div class="weatherData">
                    <div class="city-info">
                        <h1 id="cityName">- - -</h1>
                        <p id="condition"></p>
                        <h2 id="temperature">Temperature</h2>
                    </div>
                    <img id="weatherIcon" alt="weather icon">
                </div>
            </div>

            <div class="details">
                <div class="detail humid">
                    <p>Humidity</p>
                    <h3 id="humidity"></h3>
                </div>
                <div class="detail windy">
                    <p>Wind</p>
                    <h3 id="wind"></h3>
                </div>
                <div class="detail feel">
                    <p>Feels Like</p>
                    <h3 id="feelsLike"></h3>
                </div>
            </div>

    <!--     Forecast Section     -->
        <div class="buttons">
           <button class="Today day" id="Today">
                Today
           </button>
           <button class="Second day" id="Second">
                Second Day
           </button>
           <button class="Third day" id="Third">
                Third Day
           </button>
           <button class="Fourth day" id="Fourth">
                Fourth Day
           </button>
           <button class="Fifth day" id="Fifth">
                Fifth Day
           </button>
        </div>
<hr>
    <div class="weatherCardType">
        <h3>Select Card Type</h3>
        <div class="weatherStatus">
            <button class="look status">Look</button>
            <button class="humidityStatus status">Humidity</button>
            <button class="windStatus status">Wind</button>
            <button class="feelsLikeStatus status">Feels Like</button>
        </div>
    </div>
        <div class="forecast-container"></div>

        <div id="errorMsg"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
